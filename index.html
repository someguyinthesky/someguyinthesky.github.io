<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jazzercise 3D Viewer</title>
  <style>
:root {
  color-scheme: dark;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #15181c;
  color: #f4f4f2;
}

* { box-sizing: border-box; }

html, body, #viewport {
  width: 100%;
  height: 100%;
  margin: 0;
  overflow: hidden;
}

#viewport canvas { display: block; }

.panel {
  position: fixed;
  z-index: 2;
  border: 1px solid rgba(255,255,255,.13);
  background: rgba(20, 23, 27, .86);
  box-shadow: 0 8px 30px rgba(0,0,0,.28);
  backdrop-filter: blur(14px);
}

.toolbar {
  top: 16px;
  left: 16px;
  right: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  padding: 12px 14px;
  border-radius: 12px;
}

h1 { margin: 0; font-size: 16px; letter-spacing: .01em; }
p { margin: 3px 0 0; color: #aeb6bf; font-size: 12px; }
.actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }

button {
  border: 1px solid rgba(255,255,255,.16);
  border-radius: 8px;
  padding: 8px 11px;
  background: #2a3037;
  color: inherit;
  font: inherit;
  cursor: pointer;
}

button:hover { background: #39424c; }
button:focus-visible { outline: 2px solid #8fc7ff; outline-offset: 2px; }

.help {
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  padding: 9px 13px;
  border-radius: 10px;
  color: #bac1c9;
  font-size: 12px;
  white-space: nowrap;
}

.help strong { color: #fff; }

.loading {
  position: fixed;
  z-index: 3;
  inset: 0;
  display: grid;
  place-content: center;
  justify-items: center;
  gap: 12px;
  background: #15181c;
  color: #cbd0d5;
  font-size: 13px;
  transition: opacity .25s;
}

.loading.hidden { opacity: 0; pointer-events: none; }
.spinner { width: 28px; height: 28px; border: 3px solid #343a41; border-top-color: #f0f0ec; border-radius: 50%; animation: spin .8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 680px) {
  .toolbar { align-items: flex-start; }
  .actions { max-width: 210px; }
  .help { white-space: normal; width: calc(100% - 32px); justify-content: center; }
}

#ceilingButton, #fixturesButton { display: none; }

</style>
</head>
<body>
  <div id="viewport" aria-label="Interactive 3D model viewer"></div>

  <header class="panel toolbar">
    <div>
      <h1>Jazzercise 3D</h1>
      <p id="status">Loading model…</p>
    </div>
    <div class="actions">
      <button id="ceilingButton" type="button" aria-pressed="true">Hide ceilings</button>
      <button id="fixturesButton" type="button" aria-pressed="false">Show fans &amp; lights</button>
      <button id="resetButton" type="button">Reset view</button>
      <button id="fullscreenButton" type="button">Fullscreen</button>
    </div>
  </header>

  <aside class="panel help">
    <strong>Navigate</strong>
    <span>WASD to move · Shift to move faster · Drag to orbit · Scroll to zoom · Right-drag to pan</span>
  </aside>

  <div id="loading" class="loading" role="status">
    <div class="spinner"></div>
    <span>Loading jazz_3d_v3.glb</span>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">

import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const host = document.querySelector('#viewport');
const status = document.querySelector('#status');
const loading = document.querySelector('#loading');
const ceilingButton = document.querySelector('#ceilingButton');
const fixturesButton = document.querySelector('#fixturesButton');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x252a30);

const camera = new THREE.PerspectiveCamera(42, innerWidth / innerHeight, 0.01, 5000);
// The architectural master is Z-up.  Match its coordinate system so orbiting
// and keyboard travel remain parallel to the floor instead of climbing Y.
camera.up.set(0, 0, 1);
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
host.append(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.screenSpacePanning = true;

scene.add(new THREE.HemisphereLight(0xf5f7ff, 0x42403b, 2.5));
const key = new THREE.DirectionalLight(0xffffff, 3.0);
key.position.set(-30, 25, 45);
scene.add(key);
const fill = new THREE.DirectionalLight(0xbfd9ff, 1.2);
fill.position.set(30, -25, 20);
scene.add(fill);

let model;
let ceilingObjects = [];
let fixtureObjects = [];
let home = null;
let moveSpeed = 10;
const pressedKeys = new Set();
const clock = new THREE.Clock();

function frameModel(object) {
  const box = new THREE.Box3().setFromObject(object);
  const sphere = box.getBoundingSphere(new THREE.Sphere());
  const distance = sphere.radius / Math.sin(THREE.MathUtils.degToRad(camera.fov * 0.5));
  const direction = new THREE.Vector3(1, .82, 1).normalize();

  controls.target.copy(sphere.center);
  camera.position.copy(sphere.center).addScaledVector(direction, distance * .82);
  camera.near = Math.max(sphere.radius / 500, .01);
  camera.far = distance * 8;
  camera.updateProjectionMatrix();
  controls.minDistance = sphere.radius * .08;
  controls.maxDistance = distance * 3;
  controls.update();
  moveSpeed = Math.max(sphere.radius * .22, 4);

  home = { position: camera.position.clone(), target: controls.target.clone() };
}

  ceilingObjects.forEach((object) => { object.visible = visible; });
  ceilingButton.setAttribute('aria-pressed', String(visible));
  ceilingButton.textContent = visible ? 'Hide ceilings' : 'Show ceilings';
});

fixturesButton.addEventListener('click', () => {
  const visible = fixturesButton.getAttribute('aria-pressed') !== 'true';
  fixtureObjects.forEach((object) => { object.visible = visible; });
  fixturesButton.setAttribute('aria-pressed', String(visible));
  fixturesButton.textContent = visible ? 'Hide fans & lights' : 'Show fans & lights';
});

document.querySelector('#resetButton').addEventListener('click', () => {
  if (!home) return;
  camera.position.copy(home.position);
  controls.target.copy(home.target);
  controls.update();
});

document.querySelector('#fullscreenButton').addEventListener('click', async () => {
  if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
  else await document.exitFullscreen();
});

addEventListener('keydown', (event) => {
  if (!['KeyW', 'KeyA', 'KeyS', 'KeyD', 'ShiftLeft', 'ShiftRight'].includes(event.code)) return;
  if (event.target instanceof HTMLInputElement || event.target instanceof HTMLTextAreaElement) return;
  pressedKeys.add(event.code);
  event.preventDefault();
});

addEventListener('keyup', (event) => pressedKeys.delete(event.code));
addEventListener('blur', () => pressedKeys.clear());

function updateKeyboardMovement(delta) {
  if (!model || !pressedKeys.size) return;

  const forward = new THREE.Vector3();
  camera.getWorldDirection(forward);
  forward.z = 0;
  if (forward.lengthSq() < .0001) forward.set(0, 1, 0);
  forward.normalize();

  const right = new THREE.Vector3().crossVectors(forward, camera.up).normalize();
  const movement = new THREE.Vector3();
  if (pressedKeys.has('KeyW')) movement.add(forward);
  if (pressedKeys.has('KeyS')) movement.sub(forward);
  if (pressedKeys.has('KeyD')) movement.add(right);
  if (pressedKeys.has('KeyA')) movement.sub(right);
  if (!movement.lengthSq()) return;

  const sprinting = pressedKeys.has('ShiftLeft') || pressedKeys.has('ShiftRight');
  movement.normalize().multiplyScalar(moveSpeed * (sprinting ? 2.5 : 1) * delta);
  camera.position.add(movement);
  controls.target.add(movement);
}

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

renderer.setAnimationLoop(() => {
  updateKeyboardMovement(Math.min(clock.getDelta(), .05));
  controls.update();
  renderer.render(scene, camera);
});

</script>
</body>
</html>
